# phuonganh-tts configuration
#
# This file controls which models are available in the UI.
# The first model listed becomes the default when the app starts.

text_settings:
  max_chars_per_chunk: 256
  max_total_chars_streaming: 3000

# Default bundled model — auto-loaded on startup
default_model: "phuonganh-tts-v2 Turbo (CPU)"

backbone_configs:
  "phuonganh-tts-v2 (GPU)":
    repo: Nemmer/phuonganh-tts-v2
    supports_streaming: false
    description: "⭐ Mặc định — Chất lượng cao, yêu cầu GPU NVIDIA/Metal/XPU"
  "phuonganh-tts-v2 (CPU)":
    repo: Nemmer/phuonganh-tts-v2
    supports_streaming: false
    description: "⚡ Chạy trên CPU — Không cần GPU"
  "phuonganh-tts-v2 Turbo (CPU)":
    repo: Nemmer/phuonganh-tts-v2
    supports_streaming: true
    description: "🚀 Turbo: Siêu nhanh, hỗ trợ multi-lingual, tối ưu cho CPU & Thiết bị yếu"

codec_configs:
  "NeuCodec (Distill)":
    repo: Nemmer/neucodec-onnx-decoder-int8
    description: "Codec mặc định cho model GPU (LMDeploy)"
    use_preencoded: false
  "NeuCodec (ONNX)":
    repo: Nemmer/neucodec-onnx-decoder-int8
    description: "Codec ONNX cho CPU và thiết bị yếu"
    use_preencoded: false
